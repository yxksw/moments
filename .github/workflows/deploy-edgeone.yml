name: Deploy to EdgeOne Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: |
          echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" >> .env.local
          echo "NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}" >> .env.local
          echo "NEXT_PUBLIC_TWIKOO_URL=${{ secrets.NEXT_PUBLIC_TWIKOO_URL }}" >> .env.local
          echo "NEXT_PUBLIC_BLOG_URL=${{ secrets.NEXT_PUBLIC_BLOG_URL }}" >> .env.local

      - name: Build
        run: npm run build

      - name: Check output
        run: ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Deploy to EdgeOne
        id: deploy
        env:
          EDGEONE_TOKEN: ${{ secrets.EDGEONE_TOKEN }}
          EDGEONE_PROJECT_ID: ${{ secrets.EDGEONE_PROJECT_ID }}
        run: |
          npm install -g @edgeone/cli
          edgeone login --token "$EDGEONE_TOKEN"
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            edgeone pages deploy out/ --project-id "$EDGEONE_PROJECT_ID" --production
          else
            edgeone pages deploy out/ --project-id "$EDGEONE_PROJECT_ID"
          fi
