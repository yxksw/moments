name: Build and Deploy to EdgeOne

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: |
          echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" >> .env.local
          echo "NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}" >> .env.local
          echo "NEXT_PUBLIC_TWIKOO_URL=${{ secrets.NEXT_PUBLIC_TWIKOO_URL }}" >> .env.local
          echo "NEXT_PUBLIC_BLOG_URL=${{ secrets.NEXT_PUBLIC_BLOG_URL }}" >> .env.local

      - name: Build
        run: npm run build

      - name: Check output
        run: |
          ls -la out/
          cat out/recent-moments.json | head -20

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add out/ -f
          git diff --staged --quiet || git commit -m "chore: update build output [skip ci]"
          git push

      - name: Trigger EdgeOne Deploy
        run: |
          echo "Build completed and pushed. EdgeOne will auto-deploy."
          echo "Check deployment status at: https://console.tencentcloud.com/edgeone/pages/project/pages-03zttiibojgu"
